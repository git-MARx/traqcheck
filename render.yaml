databases:
  - name: traqcheck-db
    plan: free

services:
  - type: web
    name: traqcheck-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: flask create-db && gunicorn wsgi:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: traqcheck-db
          property: connectionString
      - key: FLASK_APP
        value: wsgi.py
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: BASE_URL
        sync: false
      - key: FRONTEND_ORIGINS
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false

  - type: web
    name: traqcheck-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
